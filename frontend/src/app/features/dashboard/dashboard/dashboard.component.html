<div class="dashboard-container">
  <div class="dashboard-wrapper">
    <h2 class="dashboard-title">Welcome, {{ authService.currentUser()?.firstName || 'Guest' }}</h2>

    <!-- Metrics -->
    <div class="metrics-grid">
      <div class="metric-card">
        <p class="metric-label">Upcoming Flights</p>
        <p class="metric-value">2</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">Total Miles</p>
        <p class="metric-value">14,250</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">Status</p>
        <p class="metric-value metric-primary">Elite</p>
      </div>
    </div>

    <!-- Bookings -->
    <div class="bookings-card">
      <h3 class="bookings-title">Recent Bookings</h3>
      <div class="bookings-list">
        <div class="booking-item">
          <div>
            <p class="booking-route">Teterboro (TEB) &rarr; Miami (OPA)</p>
            <p class="booking-meta">Oct 15, 2026 &bull; Gulfstream G650</p>
          </div>
          <span class="status-badge status-confirmed">CONFIRMED</span>
        </div>
        <div class="booking-item">
          <div>
            <p class="booking-route">London (FAB) &rarr; Paris (LBG)</p>
            <p class="booking-meta">Nov 02, 2026 &bull; Citation Longitude</p>
          </div>
          <span class="status-badge status-pending">PENDING</span>
        </div>
      </div>
    </div>
  </div>
</div>
