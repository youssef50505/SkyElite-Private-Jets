<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300 flex items-center justify-center overflow-hidden relative">
  <!-- Background airplane image -->
  <img #airplaneImg src="airplane.jpg" alt="Private Jet" class="absolute inset-0 w-full h-full object-cover opacity-20 dark:opacity-10 pointer-events-none" />

  <div class="relative z-10 container mx-auto px-6 text-center">
    <div #heroContent class="flex flex-col items-center">
      <!-- Logo -->
      <img src="ntg-logo.png" alt="NTG Logo" class="h-24 mb-8 drop-shadow-lg" />
      
      <p class="text-sm font-semibold text-primary dark:text-accent tracking-widest uppercase mb-4">Exclusive Private Jets</p>
      <h1 class="leading-none tracking-tighter text-ink dark:text-gray-100 mb-6">
        <span class="block text-5xl md:text-7xl drop-shadow-sm">Elevate Your</span>
        <span class="block text-6xl md:text-8xl font-bold text-primary dark:text-accent mt-2 drop-shadow-md">Journey.</span>
      </h1>
      <p class="text-lg md:text-xl text-gray-700 dark:text-gray-300 max-w-2xl mx-auto mb-10 drop-shadow-sm">Experience unparalleled luxury, efficiency, and safety. Your dedication deserves recognition.</p>
      
      <div class="flex flex-wrap gap-4 justify-center">
        <button routerLink="/home" class="btn-primary">Enter Site</button>
        <button routerLink="/search" class="btn-secondary">Book a Flight</button>
      </div>
    </div>
  </div>
</div>
