<div class="min-h-[calc(100vh-80px)] flex items-center justify-center bg-background px-4">
  <div class="bg-surface p-8 rounded-2xl border border-border shadow-sm w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-foreground mb-6">Welcome Back</h2>
    <form class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Email</label>
        <input type="email" class="w-full px-4 py-2 rounded-lg border border-border bg-background text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="Enter your email">
      </div>
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Password</label>
        <input type="password" class="w-full px-4 py-2 rounded-lg border border-border bg-background text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="Enter password">
      </div>
      <button class="btn-primary w-full mt-4">Log In</button>
    </form>
    <p class="text-center text-sm text-muted mt-4">Don't have an account? <a routerLink="/register" class="text-primary font-medium hover:underline">Register</a></p>
  </div>
</div>
