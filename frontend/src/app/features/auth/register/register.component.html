<div class="auth-container">
  <!-- Background Graphic elements -->
  <div class="auth-bg-primary"></div>
  <div class="auth-bg-secondary"></div>

  <div class="auth-card register-card">
    <!-- Logo -->
    <div class="auth-logo-wrapper">
      <div class="auth-logo-icon">
        <div class="auth-logo-inner"></div>
      </div>
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join Ascend Global for a seamless travel experience.</p>
    </div>

    @if (errorMessage()) {
      <div class="auth-error-box">
        <svg class="error-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (submit)="onSubmit($event)" class="auth-form">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input type="text" placeholder="First" required
                 class="form-input" #firstNameInput>
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input type="text" placeholder="Last" required
                 class="form-input" #lastNameInput>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" placeholder="you@example.com" required
               class="form-input" #emailInput>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" placeholder="At least 8 characters" required minlength="8"
               class="form-input" #passwordInput>
      </div>

      <div class="form-group">
        <label class="form-label">Phone number (optional)</label>
        <input type="tel" placeholder="+1 (555) 000-0000"
               class="form-input" #phoneInput>
      </div>

      <button type="submit" class="btn btn-primary auth-submit-btn" [class.opacity-70]="isLoading()" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="loading-wrapper">
            <span class="spinner"></span>
            Creating account...
          </span>
        } @else {
          Sign Up
        }
      </button>
    </form>

    <p class="auth-footer-text">
      Already have an account? <a routerLink="/login" class="auth-link">Sign in</a>
    </p>
  </div>
</div>
