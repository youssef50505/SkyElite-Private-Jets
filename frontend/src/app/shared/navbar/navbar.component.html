<nav class="navbar" [class.scrolled]="scrolled">
  <div class="navbar-container">
    
    <!-- Left Nav -->
    <div class="nav-links left-nav">
      <a routerLink="/booking" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
        Book
      </a>
      <a routerLink="/dashboard" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        My Trips
      </a>
    </div>
    
    <!-- Brand (Center) -->
    <a routerLink="/" class="brand-logo">
      <div class="logo-icon">
        <div class="logo-inner"></div>
      </div>
      <span class="brand-text">Ascend Global</span>
    </a>

    <!-- Right Nav -->
    <div class="nav-links right-nav">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      </button>
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </button>

      @if (authService.isAuthenticated()) {
        <button (click)="authService.logout()" class="btn btn-outline nav-btn">Logout</button>
      } @else {
        <a routerLink="/login" class="btn btn-primary nav-btn">Sign In</a>
      }
    </div>

    <!-- Mobile Toggle -->
    <button class="mobile-toggle" (click)="mobileOpen = !mobileOpen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
    </button>
  </div>
</nav>
