spring.application.name=skyelite-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sAir
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Java 21 Virtual Threads
spring.threads.virtual.enabled=true

# JWT Secret (Strong 256-bit key for HMAC-SHA256)
jwt.secret=a8f5f167f44f4964e6c998dee827110c71fb2ec9c5b5974dc3d3d63b2cf7b0fb
jwt.expirationMs=86400000

# Error Handling (RFC 7807)
spring.mvc.problemdetails.enabled=true
